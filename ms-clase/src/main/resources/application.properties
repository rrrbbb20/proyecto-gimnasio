spring.application.name=ms-clase
server.port=${SERVER_PORT:8094}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms-clase}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true

jwt.secret=${JWT_SECRET:1234567890123456789012345678901234567890}
eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://ms-eureka:8761/eureka/}
eureka.instance.prefer-ip-address=true

