services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - proyectogimnasio_db_data:/var/lib/mysql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  ms-eureka:
    build: ./ms-eureka
    container_name: ms-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      ms-eureka:
        condition: service_healthy
    networks:
      - backend-network

  # ─── Bases de datos individuales ──────────────────────────────────

  mysql-auth:
    image: mysql:8
    container_name: mysql-auth
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-user
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-encargado:
    image: mysql:8
    container_name: mysql-encargado
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_encargado
    ports:
      - "3316:3306"
    volumes:
      - mysql_encargado_data:/var/lib/mysql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-inventario:
    image: mysql:8
    container_name: mysql-inventario
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_inventario
    ports:
      - "3317:3306"
    volumes:
      - mysql_inventario_data:/var/lib/mysql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-sede:
    image: mysql:8
    container_name: mysql-sede
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_sede
    ports:
      - "3318:3306"
    volumes:
      - mysql_sede_data:/var/lib/mysql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-mantenimiento:
    image: mysql:8
    container_name: mysql-mantenimiento
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_mantenimiento
    ports:
      - "3319:3306"
    volumes:
      - mysql_mantenimiento_data:/var/lib/mysql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ─── Microservicios ───────────────────────────────────────────────

  auth:
    build: ./ms-auth
    container_name: auth
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_NAME: ms-user
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      mysql-auth:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    networks:
      - backend-network

  encargado:
    build: ./ms-encargado
    container_name: encargado
    ports:
      - "8090:8090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-encargado:3306/db_encargado?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      mysql-encargado:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    networks:
      - backend-network

  inventario:
    build: ./ms-inventario
    container_name: inventario
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-inventario:3306/db_inventario?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      mysql-inventario:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    networks:
      - backend-network

  sede:
    build: ./ms-sede
    container_name: sede
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-sede:3306/db_sede?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      mysql-sede:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    networks:
      - backend-network

  mantenimiento:
    build: ./ms-mantenimiento
    container_name: mantenimiento
    ports:
      - "8089:8089"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-mantenimiento:3306/db_mantenimiento?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      mysql-mantenimiento:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  proyectogimnasio_db_data:
  mysql_auth_data:
  mysql_encargado_data:
  mysql_sede_data:
  mysql_inventario_data:
  mysql_mantenimiento_data:
