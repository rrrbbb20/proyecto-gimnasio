    environment:
      DB_HOST: mysql-inscripcionclase
      DB_PORT: 3306
      DB_NAME: ms-inscripcion_clase
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Añadido para equiparar al resto de los componentes
      JAVA_OPTS: "-Xmx256m -Xms128m"
    depends_on:
      mysql-inscripcionclase:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    # 🔄 MODIFICADO: Añadido límite explícito
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO ENCARGADO ----
  encargado:
    build: ./ms-encargado
    container_name: encargado
    ports:
      - "8090:8090"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-encargado:
        condition: service_healthy
    environment:
      # 🔄 MODIFICADO: Apunta de forma precisa al contenedor 'mysql-encargado'
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-encargado:3306/db_encargado?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Inyectado punto dulce seguro
      JAVA_OPTS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          # 🔄 MODIFICADO: Inyectado punto dulce seguro
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO INVENTARIO ----
  inventario:
    build: ./ms-inventario
    container_name: inventario
    ports:
      - "8086:8086"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-inventario:
        condition: service_healthy
    environment:
      # 🔄 MODIFICADO: Apunta de forma precisa al contenedor 'mysql-inventario'
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-inventario:3306/db_inventario?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
