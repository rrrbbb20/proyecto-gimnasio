services:
  # ---- INFRAESTRUCTURA: EUREKA SERVER ----
  ms-eureka:
    build: ./ms-eureka
    container_name: ms-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      JAVA_OPTS: "-Xmx192m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend-network

  # ---- MICROSERVICIO CLIENTE ----
  cliente:
    build: ./ms-cliente
    container_name: cliente
    ports:
      - "8083:8083"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-cliente:
        condition: service_healthy
    environment:
      DB_HOST: mysql-cliente
      DB_PORT: 3306
      DB_NAME: ms-cliente
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      JAVA_OPTS: "-Xmx192m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend-network

  # ---- MICROSERVICIO RUTINA ----
  rutina:
    build: ./ms-rutina
    container_name: rutina
    ports:
      - "8088:8088"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-rutinas:
        condition: service_healthy
    environment:
      DB_HOST: mysql-rutinas
      DB_PORT: 3306
      DB_NAME: ms-rutinas
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      JAVA_OPTS: "-Xmx192m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend-network

  # ---- MICROSERVICIO PLANES ----
  planes:
    build: ./ms_planes
    container_name: planes
    ports:
      - "8087:8087"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-planes:
        condition: service_healthy
    environment:
      DB_HOST: mysql-planes
      DB_PORT: 3306
      DB_NAME: ms-planes
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      JAVA_OPTS: "-Xmx192m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend-network

  # ---- MICROSERVICIO AUTH ----
  auth:
    build: ./ms-auth
    container_name: auth
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-auth:
        condition: service_healthy
    environment:
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_NAME: ms-user
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      JAVA_OPTS: "-Xmx192m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend-network

  # ---- INFRAESTRUCTURA: SPRING CLOUD GATEWAY ----
  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    restart: unless-stopped
    ports:
      - "8099:8099"
    depends_on:
      ms-eureka:
        condition: service_healthy
    environment:
      EUREKA_URL: http://ms-eureka:8761/eureka/
      JAVA_OPTS: "-Xmx192m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend-network

  # ---- BASE DE DATOS: AUTH ----
  mysql-auth:
    image: mysql:8
    container_name: mysql-auth
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-user
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 40s # Tiempo de gracia para permitir la inicialización de tablas pesadas
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- BASE DE DATOS: CLIENTE ----
  mysql-cliente:
    image: mysql:8
    container_name: mysql-cliente
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-cliente
    ports:
      - "3313:3306"
    volumes:
      - mysql_cliente_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- BASE DE DATOS: PLANES ----
  mysql-planes:
    image: mysql:8
    container_name: mysql-planes
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-planes
    ports:
      - "3314:3306"
    volumes:
      - mysql_planes_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- BASE DE DATOS: RUTINAS ----
  mysql-rutinas:
    image: mysql:8
    container_name: mysql-rutinas
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-rutinas
    ports:
      - "3315:3306"
    volumes:
      - mysql_rutinas_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  mysql_auth_data:
  mysql_rutinas_data:
  mysql_planes_data:
  mysql_cliente_data: