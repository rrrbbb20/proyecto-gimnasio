    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- BASE DE DATOS: RUTINAS ----
  mysql-rutinas:
    image: mysql:8
    container_name: mysql-rutinas
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-rutinas
