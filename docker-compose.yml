services:
  # ---- INFRAESTRUCTURA: EUREKA SERVER ----
  ms-eureka:
    build: ./ms-eureka
    container_name: ms-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      # 🔄 MODIFICADO: Máximo de la JVM sintonizado a 256m para estabilidad bajo carga
      JAVA_OPTS: "-Xmx256m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          # 🔄 MODIFICADO: Techo de memoria asignado a 350M
          memory: 350M
    networks:
      - backend-network

  # ---- INFRAESTRUCTURA: SPRING CLOUD GATEWAY ----
  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    restart: unless-stopped
    ports:
      - "8099:8099"
    depends_on:
      ms-eureka:
        condition: service_healthy
    environment:
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Ajustado para evitar cuellos de botella en el ruteo de peticiones
      JAVA_OPTS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          # 🔄 MODIFICADO: Subido a 350M
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO AUTH ----
  auth:
    build: ./ms-auth
    container_name: auth
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-auth:
        condition: service_healthy
    environment:
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_NAME: ms-user
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      JAVA_OPTS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO CLIENTE ----
  cliente:
    build: ./ms-cliente
    container_name: cliente
    ports:
      - "8083:8083"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-cliente:
        condition: service_healthy
    environment:
      DB_HOST: mysql-cliente
      DB_PORT: 3306
      DB_NAME: ms-cliente
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Ajustado a 256m
      JAVA_OPTS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          # 🔄 MODIFICADO: Ajustado a 350M
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO RUTINA ----
  rutina:
    build: ./ms-rutina
    container_name: rutina
    ports:
      - "8088:8088"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-rutinas:
        condition: service_healthy
    environment:
      DB_HOST: mysql-rutinas
      DB_PORT: 3306
      DB_NAME: ms-rutinas
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Ajustado a 256m
      JAVA_OPTS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          # 🔄 MODIFICADO: Ajustado a 350M
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO PLANES ----
  planes:
    build: ./ms_planes
    container_name: planes
    ports:
      - "8087:8087"
    depends_on:
      ms-eureka:
        condition: service_healthy
      mysql-planes:
        condition: service_healthy
    environment:
      DB_HOST: mysql-planes
      DB_PORT: 3306
      DB_NAME: ms-planes
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Ajustado a 256m
      JAVA_OPTS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          # 🔄 MODIFICADO: Ajustado a 350M
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO CLASE ----
  clase:
    build: ./ms-clase
    container_name: clase
    restart: unless-stopped
    ports:
      - "8094:8094"
    environment:
      DB_HOST: mysql-clase
      DB_PORT: 3306
      DB_NAME: ms-clase
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Añadido para restringir el uso libre de RAM de la PC
      JAVA_OPTS: "-Xmx256m -Xms128m"
    depends_on:
      mysql-clase:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    # 🔄 MODIFICADO: Añadido límite explícito para la evaluación
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO ENTRENADOR ----
  entrenador:
    build: ./ms-entrenador
    container_name: entrenador
    restart: unless-stopped
    ports:
      - "8093:8093"
    environment:
      DB_HOST: mysql-entrenador
      DB_PORT: 3306
      DB_NAME: db_entrenador
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Añadido para estandarizar el proceso interno de Java
      JAVA_OPTS: "-Xmx256m -Xms128m"
    depends_on:
      mysql-entrenador:
        condition: service_healthy
      ms-eureka:
        condition: service_healthy
    # 🔄 MODIFICADO: Añadido límite explícito
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- MICROSERVICIO INSCRIPCION CLASE ----
  inscripcion-clase:
    build: ./ms-inscripcion-clase
    container_name: inscripcion-clase
    restart: unless-stopped
    ports:
