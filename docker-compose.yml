      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: "1234567890123456789012345678901234567890"
      EUREKA_URL: http://ms-eureka:8761/eureka/
      # 🔄 MODIFICADO: Inyectado punto dulce seguro
      JAVA_OPTS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          # 🔄 MODIFICADO: Inyectado punto dulce seguro
          memory: 350M
    networks:
      - backend-network

  # ---- BASE DE DATOS: AUTH ----
  mysql-auth:
    image: mysql:8
    container_name: mysql-auth
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-user
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - backend-network

  # ---- BASE DE DATOS: CLIENTE ----
