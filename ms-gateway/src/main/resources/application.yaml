spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-auth
              uri: http://auth:8082
              predicates:
                - Path=/auth/**

            - id: ms-cliente
              uri: http://cliente:8083
              predicates:
                - Path=/api/v3/clientes/**

            - id: ms-planes-catalogo
              uri: http://planes:8087
              predicates:
                - Path=/api/v3/planes/**

            - id: ms-planes-pagos
              uri: http://planes:8087
              predicates:
                - Path=/api/v3/pagos/**

            - id: ms-planes-suscripciones
              uri: http://planes:8087
              predicates:
                - Path=/api/v3/suscripciones/**

            - id: ms-rutina-rutinas
              uri: http://rutina:8088
              predicates:
                - Path=/api/v3/rutinas/**
            - id: ms-rutina-ejercicios
              uri: http://rutina:8088
              predicates:
                - Path=/api/v3/ejercicios/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  microservices:
    definitions:
      - name: ms-auth
        url: /auth/v3/api-docs
      - name: ms-cliente
        url: /api/v3/clientes/v3/api-docs
      - name: ms-planes
        url: /api/v3/planes/v3/api-docs
      - name: ms-rutina
        url: /api/v3/rutinas/v3/api-docs

server:
  port: 8099

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true