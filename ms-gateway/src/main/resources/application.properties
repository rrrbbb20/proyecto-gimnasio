spring.application.name=ms-gateway
server.port=8099

# CONEXIÓN OBLIGATORIA A EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Ruta 0: ms-auth
spring.cloud.gateway.server.webmvc.routes[0].id=ms-auth
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://ms-auth
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# Ruta 1: ms-entrenador
spring.cloud.gateway.server.webmvc.routes[1].id=ms-entrenador
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://ms-entrenador
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/entrenadores/**

# Ruta 2: ms-clase
spring.cloud.gateway.server.webmvc.routes[2].id=ms-clase
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://ms-clase
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/v1/clases/**

# Ruta 3: ms-inscripcion-clase
spring.cloud.gateway.server.webmvc.routes[3].id=ms-inscripcion-clase
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://ms-inscripcion-clase
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v1/inscripcion-clases/**
