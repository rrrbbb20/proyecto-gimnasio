spring:
  application:
    name: ms-planes
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms-planes}?createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8087}

jwt:
  secret: ${JWT_SECRET:1234567890123456789012345678901234567890}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
cliente:
  service:
    url: ${CLIENTE_SERVICE_URL:http://ms-cliente:8083}

debug: true