spring:
  application:
    name: ms-cliente
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms-cliente}?createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8083}

jwt:
  secret: ${JWT_SECRET:1234567890123456789012345678901234567890}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
planes:
  service:
    url: ${PLANES_SERVICE_URL:http://planes:8087}
debug: true